# Solar inverter (GoodWe GW2500-XS)
- sensor:
    - name: SEMS Portal (status)
      state: >
        {% if is_state("sensor.inverter_goodwe_status", "Normal") %}
          Online
        {% else %}
          Offline
        {% endif %}
    - name: SEMS Portal (total hours)
      state: '{{ states("sensor.inverter_goodwe_total_hours") | round(0, default=0) }} uur'
