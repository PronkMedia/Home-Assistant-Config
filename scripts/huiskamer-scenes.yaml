# Huiskamer scenes
scene_huiskamer_motion:
  sequence:
    - action: light.turn_on
      data:
        entity_id:
          - light.keuken
          - light.speelhoek
          - light.aanbouw
        brightness: 102
        color_temp_kelvin: 2700
